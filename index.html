<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Worm 單字蟲蟲</title>
<style>
  /* ===== 基本版面 ===== */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "Segoe UI", "Noto Sans TC", sans-serif;
    background:
      radial-gradient(ellipse 85% 45% at 50% -8%, rgba(255,205,130,.22), transparent 62%),
      linear-gradient(160deg, #3c2a13 0%, #5c3f20 55%, #3c2a13 100%);
    color: #fbead2;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    user-select: none; -webkit-user-select: none;
    position: relative;
  }
  /* ===== 圖書館背景（純 SVG，零外部資源） ===== */
  #library-bg {
    position: fixed; inset: 0; z-index: -1; opacity: .55;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(255,200,110,.3), transparent 70%),
      linear-gradient(160deg, #2c1d0d 0%, #47311a 60%, #2c1d0d 100%);
  }
  #library-bg svg { width: 100%; height: 100%; }
  h1 { font-size: 1.3rem; margin: 10px 0 2px; letter-spacing: 1px; color: #ffd97a; }
  #subtitle { font-size: .72rem; opacity: .65; margin-bottom: 6px; }

  /* ===== 遊戲模式選單（經典／冒險） ===== */
  #mode-select { display: flex; gap: 8px; margin-bottom: 10px; }
  .mode-btn {
    font-family: inherit; font-size: .8rem; font-weight: bold;
    padding: 6px 16px; border: 2px solid rgba(255,210,140,.25); border-radius: 999px;
    cursor: pointer; background: rgba(0,0,0,.3); color: #d8c3a0;
    transition: background .15s, border-color .15s, color .15s, transform .1s;
  }
  .mode-btn:active { transform: translateY(1px); }
  .mode-btn.active {
    background: linear-gradient(145deg, #ffd97a, #e8b420);
    color: #4a2f10; border-color: #fff2c8;
  }
  /* 冒險模式下隱藏經典專屬 HUD（Task 70 會補上 #adv-hud 取代） */
  body.mode-adventure #rankbar,
  body.mode-adventure #hud,
  body.mode-adventure #bonusbar,
  body.mode-adventure #mode { display: none; }

  /* ===== 冒險模式：地圖 / 戰鬥 HUD ===== */
  #adv-hud { display: none; width: 100%; flex-direction: column; align-items: center; margin-bottom: 10px; }
  body.mode-adventure #adv-hud { display: flex; }
  body.mode-adventure.adv-view-map #current,
  body.mode-adventure.adv-view-map #board,
  body.mode-adventure.adv-view-map #controls { display: none; }
  #adv-map, #adv-battle { width: 100%; }
  #adv-items-panel, #adv-skills-panel, #adv-mobile-drawers { display: none; }
  body.adv-view-map #adv-battle,
  body.adv-view-battle #adv-map { display: none; }
  body.mode-adventure #worm-corner { display: none; }
  body.mode-adventure #stage { width: min(1180px, calc(100vw - 40px)); justify-content: center; }
  body.mode-adventure.adv-view-battle #game-panel {
    width: 100%;
    display: grid;
    grid-template-columns: 190px minmax(280px, 1fr) 230px;
    grid-template-rows: auto auto auto;
    gap: 14px;
    align-items: stretch;
  }
  body.mode-adventure.adv-view-battle #adv-hud { grid-column: 1 / -1; margin-bottom: 0; }
  body.mode-adventure.adv-view-battle #current { display: none; }
  body.mode-adventure.adv-view-battle #board {
    grid-column: 2; grid-row: 2;
    justify-self: center; align-self: center;
    gap: 7px; padding: 13px; border-radius: 16px;
    background: rgba(0,0,0,.34);
  }
  body.mode-adventure.adv-view-battle #controls {
    grid-column: 2; grid-row: 3;
    justify-content: center; flex-wrap: wrap; margin: 0;
  }
  body.mode-adventure.adv-view-battle #submit {
    min-width: 210px; padding: 13px 28px; font-size: 1.08rem;
    background: linear-gradient(145deg, #ffd97a, #e8b420);
  }
  body.mode-adventure.adv-view-battle #clear,
  body.mode-adventure.adv-view-battle #shuffle,
  body.mode-adventure.adv-view-battle #mute {
    padding: 10px 15px; font-size: .86rem;
  }
  body.mode-adventure.adv-view-battle #mute { display: none; }
  body.mode-adventure.adv-view-battle .col { gap: 7px; }
  body.mode-adventure.adv-view-battle .tile {
    width: 58px; height: 58px; border-radius: 11px;
    font-size: 1.55rem;
  }
  body.mode-adventure.adv-view-battle .tile.locked::after {
    content: ""; width: 14px; height: 11px; right: 5px; top: 5px;
    border: 2px solid #f3e6c4; border-top-width: 6px; border-radius: 2px;
  }
  body.mode-adventure.adv-view-battle .tile.cursed::after {
    content: "C"; top: 3px; right: 5px; font-size: .72rem; color: #fff2c8;
  }
  body.mode-adventure.adv-view-battle #adv-items-panel {
    display: block; grid-column: 1; grid-row: 2 / span 2;
  }
  body.mode-adventure.adv-view-battle #adv-skills-panel {
    display: block; grid-column: 3; grid-row: 2 / span 2;
  }
  #adv-map { max-width: 440px; }
  #adv-map-head {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    width: 100%; margin-bottom: 8px;
  }
  #adv-map-title { color: #ffd97a; font-size: 1rem; font-weight: bold; }
  #adv-map-summary { font-size: .78rem; color: #d8c3a0; margin-bottom: 10px; line-height: 1.5; }
  #adv-map-path { display: grid; gap: 8px; width: 100%; }
  .adv-map-node {
    position: relative; display: grid; grid-template-columns: 34px 1fr auto; gap: 8px;
    align-items: center; width: 100%; padding: 9px 10px; border-radius: 12px;
    border: 1px solid rgba(255,210,140,.18); text-align: left;
    background: rgba(0,0,0,.26); color: #fbead2; box-shadow: none;
  }
  .adv-map-node:not(:last-child)::after {
    content: ""; position: absolute; left: 26px; top: calc(100% + 1px);
    width: 3px; height: 8px; border-radius: 999px; background: rgba(255,210,140,.25);
  }
  .adv-map-node.completed { border-color: rgba(143,212,122,.48); background: rgba(75,130,55,.22); }
  .adv-map-node.available { border-color: rgba(255,217,122,.78); background: rgba(118,78,28,.56); }
  .adv-map-node.locked { opacity: .48; cursor: default; }
  .adv-map-node.ongoing { box-shadow: 0 0 0 2px rgba(255,217,122,.28); }
  .adv-node-badge {
    width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center;
    background: rgba(0,0,0,.25); color: #ffd97a; font-size: .8rem; font-weight: bold;
  }
  .adv-map-node.completed .adv-node-badge { background: linear-gradient(145deg, #9bd66c, #4c9a35); color: #1d3414; }
  .adv-map-node.available .adv-node-badge { background: linear-gradient(145deg, #ffe38b, #e8b420); color: #4a2f10; }
  .adv-map-node.locked .adv-node-badge { background: rgba(0,0,0,.32); color: #9d8a6a; }
  .adv-node-main b { display: block; font-size: .84rem; color: #fff0bd; }
  .adv-node-main span { display: block; font-size: .7rem; color: #d8c3a0; margin-top: 2px; }
  .adv-node-state { font-size: .7rem; color: #ffd97a; white-space: nowrap; font-weight: bold; }
  .adv-map-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 10px; }
  .adv-mini-btn { padding: 6px 10px; font-size: .72rem; border-radius: 999px; }
  #adv-battle-actions { display: flex; justify-content: flex-end; gap: 6px; width: 100%; margin-bottom: 6px; }
  #adv-battle-stage {
    position: relative; min-height: 275px; border-radius: 12px;
    padding: 16px 20px 18px;
    background:
      radial-gradient(ellipse 46% 18% at 50% 88%, rgba(26,13,4,.52), transparent 70%),
      linear-gradient(180deg, rgba(62,38,14,.35), rgba(24,13,4,.28));
    border: 1px solid rgba(255,219,137,.16); overflow: hidden;
  }
  #adv-battle-stage::before {
    content: ""; position: absolute; left: 8%; right: 8%; bottom: 28px; height: 18px;
    border-radius: 999px; background: rgba(0,0,0,.2); filter: blur(2px);
  }
  #adv-chapter {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: max-content; max-width: 80%; text-align: center;
    color: #ead0a2; font-weight: 900; font-size: .95rem;
  }
  #adv-floating-word {
    position: absolute; top: 48px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 3; min-height: 46px;
  }
  .adv-word-chip {
    width: 42px; height: 46px; display: grid; place-items: center;
    border-radius: 9px; color: #6b4a1f; font-weight: 950; font-size: 1.35rem;
    background: linear-gradient(155deg, #fff8df, #f7e4b1 58%, #dfbd76);
    box-shadow: 0 4px 0 #c39a55, 0 6px 12px rgba(0,0,0,.38), inset 0 2px 1px rgba(255,255,255,.85);
  }
  #adv-combatants {
    position: absolute; inset: 58px 34px 18px;
    display: grid; grid-template-columns: 1fr minmax(150px, 220px) 1fr;
    align-items: end; gap: 18px;
  }
  .adv-combatant { display: grid; gap: 9px; align-items: end; }
  #adv-player-combatant { justify-items: start; }
  #adv-monster-combatant { justify-items: end; }
  .adv-sprite-card {
    width: 180px; height: 128px; display: grid; place-items: end center;
    filter: drop-shadow(0 8px 7px rgba(0,0,0,.45));
  }
  #adv-monster-sprite { filter: drop-shadow(0 4px 4px rgba(0,0,0,.4)); }
  #adv-monster-sprite svg { width: 170px; height: 118px; }
  .adv-nameplate {
    min-width: 245px; padding: 8px 10px; border-radius: 10px;
    background: rgba(0,0,0,.26); border: 1px solid rgba(255,220,150,.18);
  }
  .adv-name-row {
    display: flex; justify-content: space-between; gap: 10px;
    font-weight: 900; font-size: .86rem; margin-bottom: 5px;
  }
  #adv-damage-preview {
    align-self: end; justify-self: center; margin-bottom: 14px;
    padding: 10px 14px; border-radius: 999px; color: #ffe9b0;
    background: rgba(0,0,0,.32); border: 1px solid rgba(255,220,150,.22);
    text-align: center; font-weight: 900;
  }
  .adv-side-panel {
    min-height: 284px; padding: 12px; border-radius: 12px;
    background: rgba(30,17,6,.32); border: 1px solid rgba(255,220,150,.14);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
  }
  .adv-panel-title {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    margin-bottom: 10px; color: #ffe0a0; font-size: .88rem; font-weight: 950;
  }
  .adv-small-tag {
    color: #4a2f10; background: #dbc08c; border-radius: 999px;
    padding: 3px 8px; font-size: .68rem; font-weight: 900;
  }
  .adv-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  .adv-slot {
    aspect-ratio: 1; border-radius: 9px;
    background: linear-gradient(160deg, rgba(255,255,255,.05), rgba(0,0,0,.18)), rgba(0,0,0,.24);
    border: 1px solid rgba(255,220,150,.13);
  }
  .adv-empty-items {
    height: 206px; display: grid; place-items: center;
    border: 2px dashed rgba(255,223,160,.25); border-radius: 10px;
    color: #cbb18a; text-align: center; font-weight: 800; line-height: 1.45;
  }
  #adv-skills-list { display: grid; gap: 9px; }
  .adv-skill {
    display: grid; grid-template-columns: 34px 1fr; gap: 9px; align-items: center;
    padding: 8px; border-radius: 10px;
    background: rgba(0,0,0,.24); border: 1px solid rgba(255,220,150,.12);
  }
  .adv-skill-icon {
    width: 34px; height: 34px; display: grid; place-items: center; border-radius: 9px;
    color: #2e1d0a; background: linear-gradient(145deg, #f6d783, #b98a36);
    font-weight: 950; font-size: .72rem;
  }
  .adv-skill b { display: block; color: #fff1c6; font-size: .82rem; margin-bottom: 2px; }
  .adv-skill span { color: #d0b890; font-size: .72rem; line-height: 1.25; }
  #adv-mobile-drawers { gap: 8px; }
  .adv-drawer-row {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    min-height: 44px; padding: 9px 11px; border-radius: 11px;
    color: #ffe0a0; background: rgba(30,17,6,.42);
    border: 1px solid rgba(255,220,150,.16); font-weight: 950;
  }
  .adv-drawer-row span { color: #d0b890; font-size: .75rem; font-weight: 800; text-align: right; }
  .adv-row { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 320px; margin-bottom: 4px; font-size: .78rem; }
  .hpbar-wrap { flex: 1; height: 12px; background: rgba(0,0,0,.45); border-radius: 6px; overflow: hidden; border: 1px solid rgba(0,0,0,.5); }
  .hpbar { height: 100%; transition: width .3s ease; }
  .hpbar.monster { background: linear-gradient(90deg, #e2542a, #ff9a52); }
  .hpbar.player { background: linear-gradient(90deg, #5fbf4a, #8fd47a); }
  .hptext { min-width: 52px; text-align: right; opacity: .85; }

  @media (max-width: 700px) {
    body.mode-adventure #stage { width: min(100vw - 20px, 430px); }
    body.mode-adventure.adv-view-battle #game-panel {
      grid-template-columns: 1fr; gap: 10px; padding: 12px;
    }
    body.mode-adventure.adv-view-battle #adv-hud,
    body.mode-adventure.adv-view-battle #board,
    body.mode-adventure.adv-view-battle #controls,
    body.mode-adventure.adv-view-battle #adv-mobile-drawers {
      grid-column: 1; grid-row: auto;
    }
    body.mode-adventure.adv-view-battle #adv-items-panel,
    body.mode-adventure.adv-view-battle #adv-skills-panel {
      display: none;
    }
    body.mode-adventure.adv-view-battle #adv-mobile-drawers {
      display: grid;
    }
    #adv-battle-stage { min-height: 246px; padding: 12px; }
    #adv-chapter { top: 10px; width: 100%; max-width: 100%; font-size: .86rem; }
    #adv-floating-word { top: 40px; gap: 5px; }
    .adv-word-chip { width: 33px; height: 37px; border-radius: 8px; font-size: 1.05rem; }
    #adv-combatants { inset: 74px 12px 14px; grid-template-columns: 1fr 1fr; gap: 6px; }
    #adv-damage-preview { display: none; }
    .adv-sprite-card { width: 132px; height: 94px; }
    #adv-monster-sprite svg { width: 132px; height: 94px; }
    .adv-nameplate { min-width: 0; width: 100%; padding: 7px 8px; }
    .adv-name-row { font-size: .72rem; gap: 6px; }
    .hpbar-wrap { height: 11px; }
    body.mode-adventure.adv-view-battle #board { gap: 7px; padding: 12px; }
    body.mode-adventure.adv-view-battle .tile { width: 56px; height: 56px; font-size: 1.42rem; }
    body.mode-adventure.adv-view-battle #controls { gap: 8px; }
    body.mode-adventure.adv-view-battle #submit { flex: 1 1 100%; min-width: 0; padding: 13px 18px; font-size: 1.02rem; }
  body.mode-adventure.adv-view-battle #clear,
  body.mode-adventure.adv-view-battle #shuffle,
  body.mode-adventure.adv-view-battle #mute { flex: 1 1 42%; padding: 9px 8px; font-size: .78rem; }
  }

  @media (max-width: 420px) {
    body.mode-adventure #stage { width: calc(100vw - 12px); }
    body.mode-adventure.adv-view-battle #game-panel { padding: 10px; }
    #adv-battle-stage { min-height: 232px; }
    .adv-sprite-card { width: 112px; height: 84px; }
    #adv-monster-sprite svg { width: 112px; height: 84px; }
    body.mode-adventure.adv-view-battle #board { gap: 6px; padding: 10px; border-radius: 14px; }
    body.mode-adventure.adv-view-battle .tile {
      width: 50px; height: 50px; border-radius: 10px; font-size: 1.26rem;
    }
    body.mode-adventure.adv-view-battle #clear,
    body.mode-adventure.adv-view-battle #shuffle,
    body.mode-adventure.adv-view-battle #mute { font-size: .73rem; }
    .adv-node-main b { font-size: .78rem; }
    .adv-node-state { font-size: .66rem; }
  }

  /* ===== 書房舞台（蟲蟲立繪 + 書架框主體，左右並排／手機上下堆疊） ===== */
  #stage { display: flex; align-items: flex-start; gap: 16px; }
  #worm-corner {
    display: flex; flex-direction: column; align-items: center;
    min-width: 108px; padding-top: 6px;
  }
  #worm-stage { display: flex; flex-direction: column; align-items: center; }
  #worm-stage svg#wormsvg { width: 132px; height: auto; display: block;
    filter: drop-shadow(0 6px 5px rgba(0,0,0,.4)); }
  #wormface { display: block; transition: transform .3s; }
  #worm-shelf { width: 118px; margin-top: -8px; }
  #speech-bubble {
    position: relative; margin-top: 10px;
    background: #fffaf0; color: #4a2f10;
    border-radius: 14px; padding: 8px 12px;
    font-size: .78rem; font-weight: bold; text-align: center;
    max-width: 160px; box-shadow: 0 4px 10px rgba(0,0,0,.35);
    opacity: 0; transform: scale(.85); transition: opacity .22s, transform .22s;
  }
  #speech-bubble.show { opacity: 1; transform: scale(1); }
  #speech-bubble::before {
    content: ""; position: absolute; top: -7px; left: 50%; margin-left: -7px;
    border: 7px solid transparent; border-bottom-color: #fffaf0;
  }
  @media (max-width: 700px) {
    #stage { flex-direction: column; align-items: center; }
    #worm-corner { flex-direction: row; min-width: 0; padding-top: 0; gap: 6px; }
    #worm-stage svg#wormsvg { width: 76px; }
    #worm-shelf { display: none; }
    #speech-bubble { margin-top: 0; }
    #speech-bubble::before {
      top: 50%; left: -7px; margin-left: 0; margin-top: -7px;
      border-bottom-color: transparent; border-right-color: #fffaf0;
    }
  }

  /* ===== 木質書架框（遊戲主體外框） ===== */
  #game-panel {
    background:
      radial-gradient(circle 4px at 15px 15px, #e8c98a 40%, #8a6230 72%, transparent 74%),
      radial-gradient(circle 4px at calc(100% - 15px) 15px, #e8c98a 40%, #8a6230 72%, transparent 74%),
      radial-gradient(circle 4px at 15px calc(100% - 15px), #e8c98a 40%, #8a6230 72%, transparent 74%),
      radial-gradient(circle 4px at calc(100% - 15px) calc(100% - 15px), #e8c98a 40%, #8a6230 72%, transparent 74%),
      repeating-linear-gradient(90deg, rgba(0,0,0,.07) 0 2px, transparent 2px 42px),
      linear-gradient(155deg, #6b4726 0%, #543a1e 52%, #452f18 100%);
    border: 5px solid #2f2010; border-radius: 16px;
    padding: 14px 16px 18px; position: relative;
    box-shadow: 0 10px 24px rgba(0,0,0,.45), inset 0 0 0 2px rgba(255,210,140,.1);
    display: flex; flex-direction: column; align-items: center;
  }
  #game-panel::before {
    content: ""; position: absolute; top: -5px; left: -5px; right: -5px; height: 11px;
    background: linear-gradient(180deg, #86603a, #3a2711);
    border-radius: 11px 11px 0 0;
  }

  /* ===== 資訊列 ===== */
  #hud {
    display: flex; gap: 14px; align-items: center;
    background: rgba(0,0,0,.35); border-radius: 12px;
    padding: 6px 14px; margin-bottom: 8px; font-size: .85rem;
  }
  #hud b { color: #ffd97a; font-size: 1.05rem; }

  /* ===== 當前拼字 ===== */
  #current {
    min-height: 2.1rem; font-size: 1.4rem; letter-spacing: 3px;
    font-weight: bold; color: #fff;
    display: flex; align-items: center; gap: 12px;
  }
  #current .score-preview { font-size: .85rem; color: #8fd47a; font-weight: normal; }
  #current.invalid { color: #e2836a; }

  /* ===== 棋盤（7 欄交錯蜂巢） ===== */
  #board {
    display: flex; gap: 4px; padding: 10px;
    background: rgba(0,0,0,.3); border-radius: 14px;
    touch-action: none;
  }
  .col { display: flex; flex-direction: column; gap: 4px; }
  .tile {
    width: 48px; height: 48px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.25rem; font-weight: bold; color: #6b4a1f;
    background: linear-gradient(155deg, #fffaf0 0%, #f5e3b3 55%, #e9cd8c 100%);
    box-shadow:
      0 4px 0 #c9a05c, 0 7px 9px rgba(50,30,5,.4),
      inset 0 2px 1px rgba(255,255,255,.9), inset 0 -3px 5px rgba(170,120,50,.28);
    text-shadow: 0 1px 0 rgba(255,255,255,.7);
    cursor: pointer; position: relative;
    transition: transform .08s, background .15s, box-shadow .1s;
  }
  .tile.sel {
    background: linear-gradient(155deg, #fff3c4, #ffcf4d);
    transform: translateY(-2px) scale(1.07);
    box-shadow:
      0 2px 0 #c9a05c, 0 0 12px rgba(255,201,60,.75),
      inset 0 2px 1px rgba(255,255,255,.9);
    z-index: 2;
  }
  .tile.burning {
    background: linear-gradient(145deg, #ff9a52, #e2542a);
    color: #fff;
    animation: flicker .5s infinite alternate;
  }
  .tile.burning::after {
    content: "🔥"; position: absolute; top: -12px; right: -4px; font-size: .9rem;
  }
  .tile.gem-green   { background: linear-gradient(145deg,#b8f2a1,#5fbf4a); }

<script>
/* ================= 字典載入 ================= */
let DICT = null;
fetch('enable1.txt').then(r => r.text()).then(t => {
  DICT = new Set(t.split(/\r?\n/).filter(w => w.length >= 3));
  toast('字典就緒，開拼！(' + DICT.size.toLocaleString() + ' 字)');
  if (!bonusWord) pickBonusWord();
}).catch(() => toast('字典載入失敗，請重新整理', 4000));

/* ================= 常數 ================= */
let COLS = 7, ROWS = 7;
/* ================= 遊戲模式（經典／冒險） ================= */
let gameMode = localStorage.getItem('wordworm_gamemode') || 'classic';
function setBoardSize() {
  if (gameMode === 'adventure') { COLS = 4; ROWS = 4; }
  else { COLS = 7; ROWS = 7; }
}
function applyModeClass() {
  document.body.classList.toggle('mode-adventure', gameMode === 'adventure');
  document.body.classList.toggle('mode-classic', gameMode !== 'adventure');
  document.getElementById('modesel-classic').classList.toggle('active', gameMode === 'classic');
  document.getElementById('modesel-adventure').classList.toggle('active', gameMode === 'adventure');
  document.getElementById('submit').textContent = gameMode === 'adventure' ? 'Attack / 攻擊' : '拼字！';
  document.getElementById('clear').textContent = gameMode === 'adventure' ? '清除選字' : '清除';
  document.getElementById('shuffle').textContent = gameMode === 'adventure' ? '清除負面磚' : '洗牌 (-燃燒)';
}
function selectGameMode(mode) {
  if (mode === gameMode) return;
  gameMode = mode;
  localStorage.setItem('wordworm_gamemode', mode);
  applyModeClass();
  setBoardSize();
  sel = [];
  if (mode === 'adventure') initAdventure(true);
  else init(true);
}
// 字母出現權重（近似英文頻率，Qu 合併為一磚）
const LETTER_POOL = (
  'EEEEEEEEEEEE' + 'AAAAAAAAA' + 'IIIIIIIII' + 'OOOOOOOO' + 'NNNNNN' +
  'RRRRRR' + 'TTTTTT' + 'LLLL' + 'SSSS' + 'UUUU' +
  'DDDD' + 'GGG' + 'BB' + 'CC' + 'MM' + 'PP' + 'FF' + 'HH' + 'VV' + 'WW' + 'YY' +
  'K' + 'J' + 'X' + 'Q' + 'Z'
);
// 字母分值（仿 Scrabble 精神）
const LETTER_SCORE = { A:1,B:3,C:3,D:2,E:1,F:4,G:2,H:4,I:1,J:8,K:5,L:1,M:3,N:1,O:1,P:3,Q:10,R:1,S:1,T:1,U:1,V:4,W:4,X:8,Y:4,Z:10 };

/* ================= 狀態 ================= */
let grid = [];        // grid[c][r] = {letter, burning, gem}
let sel = [];         // 已選 [{c,r}]
let score = 0, wordCount = 0, bestWord = '', bestWordScore = 0;
let weakStreak = 0;   // 連續拼短字計數 → 生成燃燒磚
let over = false;
let level = 1;
let burnPhase = 0;   // Lv3-4 慢速燃燒計相位

/* ===== 關卡制（仿原版：分數門檻遞增、稱號、難度隨級升） ===== */
const RANKS = ['見習書蟲','抄寫員','圖書助理','句讀學徒','辭條編輯','副館長','館長','拼字大師','活字典','傳說書蟲 Lex'];
function levelThreshold(L) { return Math.round(1200 * Math.pow(L, 1.6)); }  // 升到 L+1 所需累積分
function rankTitle() { return RANKS[Math.min(level - 1, RANKS.length - 1)]; }
function checkLevelUp() {
  while (score >= levelThreshold(level)) {
    level++;
    sfx.levelup(); setFace('happy');
    toast('🎉 升級！Lv.' + level + '「' + rankTitle() + '」', 2000);
    pickBonusWord();
  }
  const prev = level === 1 ? 0 : levelThreshold(level - 1);
  const prog = (score - prev) / (levelThreshold(level) - prev) * 100;
  document.getElementById('lvprog').value = Math.min(100, prog);
  document.getElementById('ranktitle').textContent = 'Lv.' + level + '　' + rankTitle();
  document.getElementById('level').textContent = level;
}

/* ================= 工具 ================= */
const boardEl = document.getElementById('board');
const rand = a => a[Math.floor(Math.random() * a.length)];
const VOWELS = 'AEIOU';
/* Boggle 經典 16 骰面配方（公開設計，母音與常見組合分佈經數十年驗證）
   每次生磚＝隨機挑一顆骰擲一面，比純頻率隨機更常出「拼得起來」的盤面 */
const BOGGLE_DICE = [
  'AAEEGN','ABBJOO','ACHOPS','AFFKPS','AOOTTW','CIMOTU','DEILRX','DELRVY',
  'DISTTY','EEGHNW','EEINSU','EHRTVW','EIOSST','ELRTTY','HIMNQU','HLNNRZ'
];
function boardVowelRatio() {
  let v = 0, n = 0;
  for (const col of grid) for (const t of col) { n++; if (VOWELS.includes(t.letter[0])) v++; }
  return n ? v / n : .4;
}
function newTile() {
  // Boggle 骰子生成 + 母音平衡保底（母音比例 < 32% 時 65% 機率補母音）
  let ch;
  if (grid.length && boardVowelRatio() < .32 && Math.random() < .65) ch = rand(VOWELS);
  else ch = rand(rand(BOGGLE_DICE));
  return { letter: ch === 'Q' ? 'Qu' : ch, burning: false, gem: null, fresh: true };

let AC = null, muted = false, bgmTimer = null;
function ac() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); return AC; }
function beep(freq, dur = .09, type = 'triangle', vol = .18, when = 0) {
  if (muted) return;
  const ctx = ac(), o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, ctx.currentTime + when);
  g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + when + dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(ctx.currentTime + when); o.stop(ctx.currentTime + when + dur + .02);
}

  ok: len => { for (let i = 0; i < Math.min(len, 7); i++) beep(420 + i * 90, .1, 'triangle', .16, i * .06); },
  bad: () => { beep(160, .18, 'sawtooth', .12); beep(120, .2, 'sawtooth', .1, .1); },
  burn: () => { beep(220, .25, 'square', .1); beep(180, .3, 'square', .09, .15); },

// 存檔完整性檢查共用：grid 形狀／每格 letter 合法，防損毀存檔讓 render 之後 crash
function isValidGrid(g, cols, rows) {
  if (!Array.isArray(g) || g.length !== cols) return false;
  for (const col of g) {
    if (!Array.isArray(col) || col.length !== rows) return false;
    for (const t of col) {
      if (!t || typeof t.letter !== 'string' || !t.letter) return false;
      if ('burning' in t && typeof t.burning !== 'boolean') return false;
      if ('locked' in t && typeof t.locked !== 'boolean') return false;
      if ('cursed' in t && typeof t.cursed !== 'boolean') return false;
      if ('gem' in t && t.gem !== null && !['green', 'gold', 'sapphire', 'diamond'].includes(t.gem)) return false;
    }
  }
  return true;
}

const ADV_SAVE_KEY = 'wordworm_save_adventure_v1', ADV_PROGRESS_KEY = 'wordworm_adv_progress';
function saveAdventure() {
  if (over) { localStorage.removeItem(ADV_SAVE_KEY); return; }
  if (!adv || !isValidAdvState(adv)) return;
  localStorage.setItem(ADV_SAVE_KEY, JSON.stringify({
    grid: grid.map(col => col.map(t => ({ letter: t.letter, gem: t.gem, locked: !!t.locked, cursed: !!t.cursed }))),
    adv
  }));

function adventureLevelById(id) {
  return ADVENTURE_LEVELS.find(level => level.id === id) || null;
}
function adventureLevelByLegacy(chapterIdx, monsterIdx) {
  return ADVENTURE_LEVELS.find(level => level.chapterIdx === chapterIdx && level.levelIdx === monsterIdx) || null;
}
function normaliseAdvState(a) {
  if (!a || typeof a !== 'object') return null;
  const level = adventureLevelById(a.levelId) || adventureLevelByLegacy(a.chapterIdx, a.monsterIdx);
  if (!level) return null;
  return {
    ...a,
    levelId: level.id,
    levelIdx: level.globalIdx,
    chapterIdx: level.chapterIdx,
    monsterIdx: level.levelIdx,
  };
}
// 數值型別＋關卡索引邊界檢查，防損毀存檔 resume 到不存在的關卡讓冒險流程炸掉
function isValidAdvState(a) {
  const state = normaliseAdvState(a);
  if (!state) return false;
  const numFields = ['playerHp', 'playerMaxHp', 'monsterHp', 'monsterMaxHp', 'monsterAtk', 'chapterIdx', 'monsterIdx', 'levelIdx', 'totalKills'];
  for (const f of numFields) if (!Number.isFinite(state[f])) return false;
  if (state.chapterIdx < 0 || state.monsterIdx < 0 || state.levelIdx < 0) return false;
  if (state.playerMaxHp <= 0 || state.monsterMaxHp <= 0 || state.monsterAtk < 0) return false;
  if (state.playerHp < 0 || state.playerHp > state.playerMaxHp) return false;
  if (state.monsterHp < 0 || state.monsterHp > state.monsterMaxHp) return false;
  return true;
}
function loadAdventure() {
  try {
    const s = JSON.parse(localStorage.getItem(ADV_SAVE_KEY));
    const nextAdv = normaliseAdvState(s && s.adv);
    if (!s || !isValidGrid(s.grid, COLS, ROWS) || !isValidAdvState(nextAdv)) return false;
    grid = s.grid.map(col => col.map(t => ({ ...t, fresh: false })));
    adv = nextAdv;
    return true;
  } catch { return false; }
}
// 最佳進度（最深章節＋累計擊敗數），跟經典模式的 hiScore 概念平行但獨立
function defaultAdvProgress() {
  return withAdvProgressDerived({ version: 2, completedLevelIds: [] });
}
function withAdvProgressDerived(progress) {
  const seen = new Set();
  const completedLevelIds = (Array.isArray(progress.completedLevelIds) ? progress.completedLevelIds : [])
    .filter(id => adventureLevelById(id) && !seen.has(id) && seen.add(id))
    .sort((a, b) => adventureLevelById(a).globalIdx - adventureLevelById(b).globalIdx);
  const completed = new Set(completedLevelIds);
  let unlockedIdx = 0;
  while (unlockedIdx < ADVENTURE_LEVELS.length - 1 && completed.has(ADVENTURE_LEVELS[unlockedIdx].id)) unlockedIdx++;
  const unlocked = ADVENTURE_LEVELS[unlockedIdx];
  return {
    version: 2,
    completedLevelIds,
    unlockedLevelId: unlocked.id,
    chapter: unlocked.chapterIdx + 1,
    kills: completedLevelIds.length,
  };
}
function normaliseAdvProgress(raw) {
  if (!raw || typeof raw !== 'object') return defaultAdvProgress();
  if (raw.version === 2) return withAdvProgressDerived(raw);
  const legacyKills = Number.isFinite(raw.kills) ? Math.max(0, Math.floor(raw.kills)) : 0;
  return withAdvProgressDerived({
    version: 2,
    completedLevelIds: ADVENTURE_LEVELS.slice(0, Math.min(legacyKills, ADVENTURE_LEVELS.length)).map(level => level.id),
  });
}
function advBestProgress() {
  try { return normaliseAdvProgress(JSON.parse(localStorage.getItem(ADV_PROGRESS_KEY))); }
  catch { return defaultAdvProgress(); }
}
function saveAdvProgress(progress) {
  const next = withAdvProgressDerived(progress);
  localStorage.setItem(ADV_PROGRESS_KEY, JSON.stringify(next));
  return next;
}
function updateAdvBestProgress(levelId) {
  const progress = advBestProgress();
  if (levelId && adventureLevelById(levelId) && !progress.completedLevelIds.includes(levelId)) {
    progress.completedLevelIds.push(levelId);
  }
  return saveAdvProgress(progress);
}
function adventureUnlockedIndex(progress = advBestProgress()) {
  return adventureLevelById(progress.unlockedLevelId).globalIdx;
}
function isAdventureLevelUnlocked(levelId, progress = advBestProgress()) {
  const level = adventureLevelById(levelId);
  return !!level && level.globalIdx <= adventureUnlockedIndex(progress);
}

  if (gameMode === 'adventure' || easyMode) return !(a.c === b.c && a.r === b.r);  // 冒險模式／輕鬆模式：全盤任選

  const el = document.elementFromPoint(x, y);
  return el && el.classList.contains('tile') ? { c: +el.dataset.c, r: +el.dataset.r } : null;

function pick(p) {
  if (over || !p) return;
  if (grid[p.c][p.r].locked) return;  // 鎖定磚不可選取（冒險模式怪物技能）
  const i = sel.findIndex(s => s.c === p.c && s.r === p.r);
  if (i !== -1) {
    if (i === sel.length - 2 && dragging) sel.pop();      // 拖回上一格 = 反悔
    else if (!dragging) sel = sel.slice(0, i);            // 點已選的 = 截斷到該處之前
  } else if (sel.length === 0 || adjacent(sel[sel.length - 1], p)) {
    sel.push(p);
    sfx.pick(sel.length);
  } else if (!dragging) {
    sel = [p];                                            // 點不相鄰的 = 重新開始選
  }
  render(); updateCurrent();
}

function wordScore(word, tiles) {
  let base = 0;
  for (const ch of word.toUpperCase()) base += LETTER_SCORE[ch] || 0;
  // 長度加成：4字x1.5、5字x2、6字x3、7+字x4（取整）
  const L = word.length;
  const mult = L >= 7 ? 4 : L >= 6 ? 3 : L >= 5 ? 2 : L >= 4 ? 1.5 : 1;
  let s = Math.round(base * mult * 10);
  // 寶石加成
  for (const p of tiles) {
    const g = grid[p.c][p.r].gem;
    if (g === 'green') s += 100;
    if (g === 'gold') s += 250;
    if (g === 'sapphire') s += 500;
    if (g === 'diamond') s += 1000;
  }
  return s;
}

function cefrPool() {

// 檢查棋盤能否拼出 word：經典模式=DFS 相鄰路徑；輕鬆模式=字母庫存數量足夠
function canSpell(word) {
  const W = word.toUpperCase().replace(/QU/g, 'Q');  // Qu 磚以 Q 代表
  const letterAt = (c, r) => grid[c][r].letter === 'Qu' ? 'Q' : grid[c][r].letter;
  if (gameMode === 'adventure' || easyMode) {
    const stock = {};
    for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++)
      stock[letterAt(c, r)] = (stock[letterAt(c, r)] || 0) + 1;
    const need = {};
    for (const ch of W) need[ch] = (need[ch] || 0) + 1;
    return Object.entries(need).every(([ch, n]) => (stock[ch] || 0) >= n);
  }
  const dfs = (i, c, r, used) => {
    if (letterAt(c, r) !== W[i]) return false;
    if (i === W.length - 1) return true;
    used.add(c * 100 + r);
    for (let dc = -1; dc <= 1; dc++) for (let dr = -1; dr <= 1; dr++) {
      if (!dc && !dr) continue;
      const nc = c + dc, nr = r + dr;
      if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) continue;
      if (used.has(nc * 100 + nr)) continue;
      if (dfs(i + 1, nc, nr, used)) { used.delete(c * 100 + r); return true; }
    }
    used.delete(c * 100 + r);
    return false;
  };
  for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++)
    if (dfs(0, c, r, new Set())) return true;
  return false;
}

  if (!DICT) return;
  const pool = cefrPool() || [...DICT].filter(w => w.length >= 4 && w.length <= 6);
  // 隨機挑，直到找到棋盤真的拼得出來的字（保底：試 200 次後放寬到任何可拼字典字）
  const shuffled = [...pool].sort(() => Math.random() - .5);
  for (const w of shuffled.slice(0, 200)) {
    if (w.length >= 3 && DICT.has(w.toLowerCase()) && canSpell(w)) {
      bonusWord = w.toUpperCase();
      document.getElementById('bonusword').textContent = bonusWord;
      return;
    }
  }
  bonusWord = '';
  document.getElementById('bonusword').textContent = '—';
}
// 棋盤變動後檢查目前題目是否仍可拼，不行就換題
function revalidateBonus() {
  if (bonusWord && !canSpell(bonusWord)) pickBonusWord();
}

function submit() {
  if (over) return;
  const w = currentWord();
  if (w.length < 3) { toast('至少 3 個字母'); return; }
  if (!DICT) { toast('字典還在載入…'); return; }
  if (!DICT.has(w.toLowerCase())) { sfx.bad(); setFace('sad'); bubble(quip(QUIPS.bad)); shake();
    setTimeout(() => setFace('normal'), 1200); return; }
  if (gameMode === 'adventure') { submitAdventure(w); return; }
  submitClassic(w);
}

function submitClassic(w) {
  let s = wordScore(w, sel);
  const isBonus = w.toUpperCase() === bonusWord;
  if (isBonus) s *= 3;
  score += s; wordCount++;
  if (s > bestWordScore) { bestWordScore = s; bestWord = w; }

  sfx.ok(w.length); setFace('happy');
  const face = document.getElementById('wormface');
  face.style.transform = 'scale(1.25)'; setTimeout(() => face.style.transform = '', 250);

  if (isBonus) { toast('🎊 BONUS ×3！+' + s, 2000); setTimeout(() => bubble(quip(QUIPS.bonus)), 800); pickBonusWord(); }
  else {
    toast('+' + s + '　' + praise(w.length), 1100);
    if (Math.random() < .45) setTimeout(() => bubble(quip(w.length <= 3 ? QUIPS.short : w.length <= 5 ? QUIPS.mid : QUIPS.long)), 900);
  }

  // 燃燒磚壓力：短字累積、長字洩壓
  if (w.length <= 3) weakStreak++;
  else if (w.length >= 5) weakStreak = Math.max(0, weakStreak - 2);
  const gemTier = isBonus ? 'diamond' : w.length >= 8 ? 'diamond' : w.length >= 7 ? 'sapphire' : w.length >= 6 ? 'gold' : w.length >= 5 ? 'green' : null;

  removeTiles(sel, gemTier);
  sel = [];
  /* 難度曲線：
     Lv1-2 蜜月期＝不生燃燒磚、不燒；
     Lv3-4 慢速期＝燃燒磚每 2 次提交才下沉一格；
     Lv5+ 正常＋隨等級遞增 */
  if (level >= 3) {
    burnPhase++;
    if (level >= 5 || burnPhase % 2 === 0) advanceBurning();
    const streakLimit = Math.max(2, 5 - Math.floor(level / 4));
    if (weakStreak >= streakLimit) { spawnBurning(); weakStreak = 0; }
    else if (level >= 5 && Math.random() < (level - 4) * 0.015) spawnBurning();
  }
  revalidateBonus();
  render(); updateCurrent(); updateHud();
  checkLevelUp();
  saveGame();
  checkOver();
}

function praise(L) {
  return L >= 8 ? '傳說單字！💎' : L >= 7 ? '藍寶石級！' : L >= 6 ? '黃金單字！' : L >= 5 ? '漂亮！' : '不錯！';
}
function shake() {
  boardEl.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}], {duration:200});
}

/* ================= 磚塊移除 / 掉落補充 ================= */
function removeTiles(tiles, gemTier) {
  // 依欄分組，由該欄底部往上壓縮
  const byCol = {};
  for (const p of tiles) (byCol[p.c] ||= []).push(p.r);
  let gemPlaced = !gemTier;
  for (const c in byCol) {
    const col = grid[c];
    const remove = new Set(byCol[c]);
    const kept = col.filter((_, r) => !remove.has(r));
    const need = ROWS - kept.length;
    const fresh = Array.from({length: need}, newTile);
    if (!gemPlaced && fresh.length) { fresh[0].gem = gemTier; gemPlaced = true; }
    grid[c] = [...fresh, ...kept];
  }
}
// 冒險模式：拼掉的磚原地生成新磚（不做欄位掉落壓縮，棋盤形狀固定 4×4）
function removeTilesAdventure(tiles, gemTier) {
  let gemPlaced = !gemTier;
  for (const p of tiles) {
    const t = newTile();
    if (!gemPlaced) { t.gem = gemTier; gemPlaced = true; }
    grid[p.c][p.r] = t;
  }
}

/* ================= 燃燒磚 ================= */
function spawnBurning() {
  const c = Math.floor(Math.random() * COLS);
  grid[c][0].burning = true;
  sfx.burn();
  toast('🔥 燃燒磚出現了！拼長一點的字！', 1600);
}
function advanceBurning() {
  // 每次提交後，所有燃燒磚往下燒一格（把下面那格變燃燒，自己熄滅成新磚）
  const moves = [];
  for (let c = 0; c < COLS; c++)
    for (let r = ROWS - 1; r >= 0; r--)
      if (grid[c][r].burning) moves.push({c, r});
  for (const {c, r} of moves) {
    if (r === ROWS - 1) { over = true; return; }  // 燒到底
    grid[c][r] = newTile();
    grid[c][r + 1].burning = true;
  }
}
function shuffle() {
  if (over) return;
  // 洗牌代價：生成一顆燃燒磚（原版精神：躲避是有代價的）
  const letters = [];
  for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) letters.push(grid[c][r]);
  for (let i = letters.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [letters[i], letters[j]] = [letters[j], letters[i]];
  }
  let i = 0;
  for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) grid[c][r] = letters[i++];
  sel = [];
  if (level >= 3) spawnBurning();
  else toast('洗好了～（Lv.3 之後洗牌會有燃燒磚代價喔）', 1800);
  revalidateBonus();
  render(); updateCurrent();
  saveGame();
}

function battleDamage(word, tiles) {
  let dmg = word.length * 3;
  for (const ch of word.toUpperCase()) dmg += (LETTER_SCORE[ch] || 0);
  let cursed = false;
  for (const p of tiles) {
    const t = grid[p.c][p.r];
    if (t.gem) dmg += t.gem === 'diamond' ? 20 : t.gem === 'sapphire' ? 12 : t.gem === 'gold' ? 8 : 4;
    if (t.cursed) cursed = true;
  }
  if (cursed) dmg = Math.round(dmg * .5);  // 詛咒磚：本次攻擊減傷
  return Math.max(1, Math.round(dmg));
}
// 怪物技能：把場上 1-2 顆磚變成鎖定磚／詛咒磚（策略點：花回合清爛磚 vs 硬拼繞開）
function monsterSkillAlter() {
  const candidates = [];
  for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++)
    if (!grid[c][r].locked && !grid[c][r].cursed) candidates.push({ c, r });
  const n = Math.min(candidates.length, Math.random() < .5 ? 1 : 2);
  for (let i = 0; i < n; i++) {
    const idx = Math.floor(Math.random() * candidates.length);
    const p = candidates.splice(idx, 1)[0];
    if (Math.random() < .5) grid[p.c][p.r].locked = true;
    else grid[p.c][p.r].cursed = true;
  }
}

}
function showAdventureMap() {
  if (adv && adv.monsterHp > 0 && !over && isValidGrid(grid, COLS, ROWS)) saveAdventure();
  sel = [];
  setAdventureView('map');
  if (grid.length === COLS) { render(); updateCurrent(); }
  renderAdvMap();
}
function makeAdventureState(level) {
  return {
    levelId: level.id,
    levelIdx: level.globalIdx,
    chapterIdx: level.chapterIdx,
    monsterIdx: level.levelIdx,
    playerHp: 100,
    playerMaxHp: 100,
    monsterHp: 0,
    monsterMaxHp: 0,
    monsterAtk: 0,
    monsterName: '',
    monsterKind: level.kind,
    isBoss: !!level.boss,
    totalKills: advBestProgress().completedLevelIds.length,
  };
}
function startAdventureLevel(levelId) {
  const level = adventureLevelById(levelId);
  if (!level || !isAdventureLevelUnlocked(levelId)) {
    toast('這關還沒解鎖，先把前面的書庫清乾淨。', 1600);
    return;
  }
  document.getElementById('adv-gameover').classList.remove('show');
  over = false; sel = []; setFace('normal');
  const canResume = adv && adv.levelId === levelId && adv.monsterHp > 0 && isValidGrid(grid, COLS, ROWS);
  if (!canResume) {
    localStorage.removeItem(ADV_SAVE_KEY);
    adv = makeAdventureState(level);
    freshBoard();
    startMonster();
  }
  setAdventureView('battle');
  render(); updateCurrent(); renderAdvHud();
  saveAdventure();
}
function restartAdventureGame() {
  if (!confirm('重新開始會清除冒險模式進度與目前戰鬥；經典模式存檔不會受影響。確定要重來嗎？')) return;
  localStorage.removeItem(ADV_SAVE_KEY);
  localStorage.removeItem(ADV_PROGRESS_KEY);
  adv = null; sel = []; over = false;
  document.getElementById('adv-gameover').classList.remove('show');
  freshBoard(); render(); updateCurrent(); setFace('normal');
  showAdventureMap();
  toast('冒險模式已重新開始。', 1600);
}
function startMonster() {
  const m = adventureLevelById(adv.levelId);
  adv.chapterIdx = m.chapterIdx; adv.monsterIdx = m.levelIdx; adv.levelIdx = m.globalIdx;
  adv.monsterName = m.name; adv.monsterKind = m.kind; adv.isBoss = !!m.boss;
  adv.monsterHp = m.hp; adv.monsterMaxHp = m.hp; adv.monsterAtk = m.atk;
  renderAdvHud();
  bubble(adv.isBoss ? ('Boss 出現：' + m.name + '！') : ('遭遇 ' + m.name + '！'));
}
function defeatMonster() {
  const level = adventureLevelById(adv.levelId);
  bubble('打倒了 ' + adv.monsterName + '！');
  sfx.levelup();
  adv.totalKills++;
  const progress = updateAdvBestProgress(level.id);
  localStorage.removeItem(ADV_SAVE_KEY);
  sel = [];
  render(); updateCurrent();
  showAdventureMap();
  const nextLevel = ADVENTURE_LEVELS.find(item => !progress.completedLevelIds.includes(item.id));
  toast(nextLevel ? ('關卡通過！下一關已解鎖：' + nextLevel.name) : '🎉 所有關卡都通關了！可以回地圖重打。', 2600);
}
function checkAdvOver() {
  if (adv && adv.playerHp <= 0 && !over) {
    over = true;
    sfx.over(); setFace('sad');
    updateAdvBestProgress();
    saveAdventure();  // over=true 時會自動清掉舊存檔
    document.getElementById('adv-fchapter').textContent = adv.chapterIdx + 1;
    document.getElementById('adv-fkills').textContent = adv.totalKills;
    document.getElementById('adv-gameover').classList.add('show');
  }
}
function initAdventure(fromSave = false) {
  sel = []; over = false;
  document.getElementById('adv-gameover').classList.remove('show');
  setFace('normal');
  const hasBattleSave = fromSave && loadAdventure();
  if (!hasBattleSave) {
    localStorage.removeItem(ADV_SAVE_KEY);
    adv = null;
    freshBoard();
  }
  if (grid.length !== COLS) freshBoard();
  render(); updateCurrent();
  showAdventureMap();
  if (hasBattleSave) toast('讀取冒險戰鬥，可從地圖繼續。', 1600);
}
function submitAdventure(w) {
  if (!adv) return;
  const dmg = battleDamage(w, sel);
  adv.monsterHp = Math.max(0, adv.monsterHp - dmg);

  sfx.ok(w.length); setFace('happy');
  const face = document.getElementById('wormface');
  face.style.transform = 'scale(1.25)'; setTimeout(() => face.style.transform = '', 250);
  toast('攻擊 -' + dmg, 1000);
  if (Math.random() < .4) setTimeout(() => bubble(quip(w.length <= 3 ? QUIPS.short : w.length <= 5 ? QUIPS.mid : QUIPS.long)), 700);

  const gemTier = w.length >= 8 ? 'diamond' : w.length >= 7 ? 'sapphire' : w.length >= 6 ? 'gold' : w.length >= 5 ? 'green' : null;
  removeTilesAdventure(sel, gemTier);
  sel = [];

  if (adv.monsterHp <= 0) {
    // 刻意設計：斬殺當回合不觸發反擊（怪物已死不能還手），非漏掉的分支
    defeatMonster();
    return;
  } else {
    monsterCounter();
  }
  render(); updateCurrent();
  renderAdvHud();
  checkAdvOver();
  if (!over) saveAdventure();
}
function shuffleAdventure() {
  if (over || !adv) return;
  let cleared = 0;
  for (let c = 0; c < COLS; c++) for (let r = 0; r < ROWS; r++) {
    if (grid[c][r].locked || grid[c][r].cursed) { grid[c][r] = newTile(); cleared++; }
  }
  sel = [];
  toast(cleared ? ('清除了 ' + cleared + ' 顆負面磚！') : '目前沒有負面磚可清', 1400);
  monsterCounter();
  render(); updateCurrent();
  renderAdvHud();
  checkAdvOver();
  if (!over) saveAdventure();
}
document.getElementById('adv-restart').onclick = () => initAdventure();

/* ================= 程式進入點 ================= */
setBoardSize();
applyModeClass();
if (gameMode === 'adventure') initAdventure(true);
else init(true);
</script>
</body>
