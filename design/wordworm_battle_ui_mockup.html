<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Word Worm Adventure Battle UI Mockup</title>
<style>
  :root {
    --bg-deep: #2f1e0c;
    --bg-mid: #543719;
    --wood-dark: #3a240e;
    --wood: #6d451f;
    --wood-lite: #966438;
    --ink: #3d2810;
    --paper: #f7e4b1;
    --paper-lite: #fff8df;
    --gold: #f5c641;
    --gold-dark: #aa7728;
    --cream: #fbead2;
    --muted: #cbb18a;
    --leaf: #78ca55;
    --leaf-dark: #4c9a35;
    --danger: #e95732;
    --panel-shadow: rgba(0, 0, 0, .38);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Segoe UI", "Noto Sans TC", sans-serif;
    color: var(--cream);
    background:
      radial-gradient(ellipse 70% 36% at 50% -10%, rgba(255, 210, 135, .25), transparent 68%),
      linear-gradient(150deg, var(--bg-deep) 0%, var(--bg-mid) 55%, var(--bg-deep) 100%);
    overflow-x: hidden;
  }

  .library-bg {
    position: fixed;
    inset: 0;
    opacity: .42;
    z-index: -1;
    background:
      linear-gradient(90deg, transparent 0 8%, rgba(24, 13, 4, .7) 8% 28%, transparent 28% 36%, rgba(24, 13, 4, .62) 36% 64%, transparent 64% 72%, rgba(24, 13, 4, .7) 72% 92%, transparent 92%),
      repeating-linear-gradient(0deg, transparent 0 150px, rgba(114, 72, 26, .28) 150px 162px, transparent 162px 288px);
  }
  .library-bg::before,
  .library-bg::after {
    content: "";
    position: absolute;
    left: 3%;
    right: 3%;
    height: 104px;
    background:
      repeating-linear-gradient(90deg,
        transparent 0 16px,
        #7e4a24 16px 34px,
        #526344 34px 48px,
        #8a5726 48px 70px,
        #5e5369 70px 84px,
        #733e26 84px 106px),
      linear-gradient(#43280f, #43280f);
    background-size: auto 80px, auto 10px;
    background-position: 0 18px, 0 92px;
    background-repeat: repeat-x;
    border-top: 10px solid rgba(65, 38, 13, .9);
    border-bottom: 10px solid rgba(65, 38, 13, .9);
  }
  .library-bg::before { bottom: 44px; }
  .library-bg::after { bottom: 242px; transform: scaleX(.8); }

  .mockup {
    width: min(1180px, calc(100vw - 40px));
    margin: 22px auto 34px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 18px;
    margin-bottom: 12px;
  }
  .brand h1 {
    margin: 0;
    font-size: 2rem;
    line-height: 1;
    color: #ffd97a;
    text-shadow: 0 3px 0 rgba(0, 0, 0, .25);
  }
  .brand p {
    margin: 6px 0 0;
    color: var(--muted);
    font-weight: 700;
    font-size: .95rem;
  }
  .mode-pill {
    border: 2px solid #fff0bd;
    border-radius: 999px;
    padding: 8px 18px;
    color: #4a2f10;
    background: linear-gradient(145deg, #ffe38b, #e8b420);
    box-shadow: 0 4px 0 rgba(105, 67, 25, .8);
    font-weight: 900;
    white-space: nowrap;
  }

  .game-shell {
    position: relative;
    padding: 18px;
    border-radius: 16px;
    background:
      radial-gradient(circle 5px at 18px 18px, #e8c98a 42%, #8a6230 73%, transparent 75%),
      radial-gradient(circle 5px at calc(100% - 18px) 18px, #e8c98a 42%, #8a6230 73%, transparent 75%),
      radial-gradient(circle 5px at 18px calc(100% - 18px), #e8c98a 42%, #8a6230 73%, transparent 75%),
      radial-gradient(circle 5px at calc(100% - 18px) calc(100% - 18px), #e8c98a 42%, #8a6230 73%, transparent 75%),
      repeating-linear-gradient(90deg, rgba(255,255,255,.035) 0 2px, transparent 2px 112px),
      linear-gradient(90deg, #5b3718, #775025 45%, #5a3617);
    box-shadow:
      0 0 0 5px rgba(45, 27, 10, .95),
      0 14px 24px var(--panel-shadow),
      inset 0 1px 0 rgba(255, 227, 150, .22);
  }
  .game-shell::before {
    content: "";
    position: absolute;
    left: -5px;
    right: -5px;
    top: -6px;
    height: 14px;
    border-radius: 14px 14px 0 0;
    background: linear-gradient(180deg, #956a3d, #3a2711);
  }

  .battle-stage {
    position: relative;
    min-height: 275px;
    border-radius: 12px;
    padding: 16px 20px 18px;
    background:
      radial-gradient(ellipse 46% 18% at 50% 88%, rgba(26, 13, 4, .52), transparent 70%),
      linear-gradient(180deg, rgba(62, 38, 14, .35), rgba(24, 13, 4, .28));
    border: 1px solid rgba(255, 219, 137, .16);
    overflow: hidden;
  }
  .battle-stage::before {
    content: "";
    position: absolute;
    left: 8%;
    right: 8%;
    bottom: 28px;
    height: 18px;
    border-radius: 999px;
    background: rgba(0, 0, 0, .2);
    filter: blur(2px);
  }

  .chapter {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: #ead0a2;
    font-weight: 900;
    font-size: .95rem;
    letter-spacing: 0;
  }

  .floating-word {
    position: absolute;
    top: 48px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 3;
  }
  .word-chip {
    width: 42px;
    height: 46px;
    display: grid;
    place-items: center;
    border-radius: 9px;
    color: #6b4a1f;
    font-weight: 950;
    font-size: 1.35rem;
    background: linear-gradient(155deg, var(--paper-lite), var(--paper) 58%, #dfbd76);
    box-shadow: 0 4px 0 #c39a55, 0 6px 12px rgba(0,0,0,.38), inset 0 2px 1px rgba(255,255,255,.85);
  }

  .combatants {
    position: absolute;
    inset: 58px 34px 18px;
    display: grid;
    grid-template-columns: 1fr minmax(170px, 240px) 1fr;
    align-items: end;
    gap: 18px;
  }
  .combatant {
    display: grid;
    gap: 9px;
    align-items: end;
  }
  .combatant.player { justify-items: start; }
  .combatant.monster { justify-items: end; }
  .sprite-card {
    width: 180px;
    height: 128px;
    display: grid;
    place-items: end center;
    filter: drop-shadow(0 8px 7px rgba(0,0,0,.45));
  }
  .monster .sprite-card { transform: scaleX(-1); }
  .nameplate {
    min-width: 245px;
    padding: 8px 10px;
    border-radius: 10px;
    background: rgba(0,0,0,.26);
    border: 1px solid rgba(255,220,150,.18);
  }
  .name-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-weight: 900;
    font-size: .86rem;
    margin-bottom: 5px;
  }
  .hp-track {
    height: 14px;
    border-radius: 999px;
    background: rgba(0,0,0,.48);
    border: 1px solid rgba(0,0,0,.55);
    overflow: hidden;
  }
  .hp-fill {
    height: 100%;
    border-radius: 999px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.3);
  }
  .hp-fill.player { width: 82%; background: linear-gradient(90deg, #5fbf4a, #9bd66c); }
  .hp-fill.monster { width: 48%; background: linear-gradient(90deg, #d6452c, #ff9149); }

  .damage-preview {
    align-self: end;
    justify-self: center;
    margin-bottom: 14px;
    padding: 10px 14px;
    border-radius: 999px;
    color: #ffe9b0;
    background: rgba(0,0,0,.32);
    border: 1px solid rgba(255,220,150,.22);
    text-align: center;
    font-weight: 900;
  }

  .play-area {
    display: grid;
    grid-template-columns: 190px minmax(280px, 1fr) 230px;
    gap: 14px;
    align-items: stretch;
    margin-top: 14px;
  }

  .side-panel,
  .board-panel {
    border-radius: 12px;
    background: rgba(30, 17, 6, .32);
    border: 1px solid rgba(255, 220, 150, .14);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
  }
  .side-panel {
    padding: 12px;
    min-height: 284px;
  }
  .panel-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
    color: #ffe0a0;
    font-size: .88rem;
    font-weight: 950;
  }
  .small-tag {
    color: #4a2f10;
    background: #dbc08c;
    border-radius: 999px;
    padding: 3px 8px;
    font-size: .68rem;
    font-weight: 900;
  }
  .empty-items {
    height: 206px;
    display: grid;
    place-items: center;
    border: 2px dashed rgba(255, 223, 160, .25);
    border-radius: 10px;
    color: #cbb18a;
    text-align: center;
    font-weight: 800;
    line-height: 1.45;
  }
  .slots {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 10px;
  }
  .slot {
    aspect-ratio: 1;
    border-radius: 9px;
    background:
      linear-gradient(160deg, rgba(255,255,255,.05), rgba(0,0,0,.18)),
      rgba(0,0,0,.24);
    border: 1px solid rgba(255, 220, 150, .13);
  }

  .skills {
    display: grid;
    gap: 9px;
  }
  .skill {
    display: grid;
    grid-template-columns: 34px 1fr;
    gap: 9px;
    align-items: center;
    padding: 8px;
    border-radius: 10px;
    background: rgba(0,0,0,.24);
    border: 1px solid rgba(255, 220, 150, .12);
  }
  .skill-icon {
    width: 34px;
    height: 34px;
    display: grid;
    place-items: center;
    border-radius: 9px;
    color: #2e1d0a;
    background: linear-gradient(145deg, #f6d783, #b98a36);
    font-weight: 950;
  }
  .skill b {
    display: block;
    color: #fff1c6;
    font-size: .82rem;
    margin-bottom: 2px;
  }
  .skill span {
    color: #d0b890;
    font-size: .72rem;
    line-height: 1.25;
  }

  .board-panel {
    display: grid;
    justify-items: center;
    align-content: center;
    gap: 14px;
    padding: 14px;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(4, 58px);
    gap: 7px;
    padding: 13px;
    border-radius: 16px;
    background: rgba(0,0,0,.34);
  }
  .tile {
    width: 58px;
    height: 58px;
    display: grid;
    place-items: center;
    border-radius: 11px;
    color: #6b4a1f;
    font-size: 1.55rem;
    font-weight: 950;
    background: linear-gradient(155deg, var(--paper-lite) 0%, var(--paper) 58%, #e4c073 100%);
    box-shadow: 0 5px 0 #c39a55, 0 8px 10px rgba(35,20,5,.42), inset 0 2px 1px rgba(255,255,255,.9);
  }
  .tile.sel {
    background: linear-gradient(155deg, #fff3c4, #ffcf4d);
    transform: translateY(-2px);
    box-shadow: 0 3px 0 #c39a55, 0 0 14px rgba(255,201,60,.7), inset 0 2px 1px rgba(255,255,255,.9);
  }
  .tile.locked {
    color: #e8e8e8;
    background: linear-gradient(155deg, #9a9a9a, #5d5d5d);
    box-shadow: 0 5px 0 #3f3f3f, inset 0 2px 1px rgba(255,255,255,.25);
    position: relative;
  }
  .tile.locked::after {
    content: "";
    position: absolute;
    width: 14px;
    height: 11px;
    right: 5px;
    top: 5px;
    border: 2px solid #f3e6c4;
    border-top-width: 6px;
    border-radius: 2px;
  }
  .tile.cursed {
    color: #fff;
    background: linear-gradient(155deg, #bc92e6, #7445bb);
    box-shadow: 0 5px 0 #4e2d82, inset 0 2px 1px rgba(255,255,255,.3);
  }

  .buttons {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
  }
  .btn {
    border: 0;
    border-radius: 12px;
    font-family: inherit;
    color: #4a2f10;
    font-weight: 950;
    box-shadow: 0 4px 0 #9a6b2a;
  }
  .attack {
    min-width: 210px;
    padding: 13px 28px;
    font-size: 1.08rem;
    background: linear-gradient(145deg, #ffd97a, #e8b420);
  }
  .secondary {
    padding: 10px 15px;
    font-size: .86rem;
    background: linear-gradient(145deg, #d8cbb2, #b0a184);
  }

  .mobile-drawer {
    display: none;
  }

  svg { display: block; max-width: 100%; }

  @media (max-width: 700px) {
    body {
      background:
        radial-gradient(circle 220px at 58% 4%, rgba(255,210,135,.23), transparent 70%),
        linear-gradient(150deg, var(--bg-deep), var(--bg-mid) 54%, var(--bg-deep));
    }
    .mockup {
      width: min(100vw - 20px, 430px);
      margin: 12px auto 24px;
    }
    .topbar {
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 9px;
      text-align: center;
    }
    .brand h1 { font-size: 1.75rem; }
    .brand p { font-size: .82rem; }
    .mode-pill { padding: 7px 16px; }
    .game-shell {
      padding: 12px;
      border-radius: 15px;
    }
    .battle-stage {
      min-height: 246px;
      padding: 12px;
    }
    .chapter {
      width: 100%;
      top: 10px;
      text-align: center;
      font-size: .86rem;
    }
    .floating-word {
      top: 40px;
      gap: 5px;
    }
    .word-chip {
      width: 33px;
      height: 37px;
      border-radius: 8px;
      font-size: 1.05rem;
    }
    .combatants {
      inset: 74px 12px 14px;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .damage-preview {
      display: none;
    }
    .sprite-card {
      width: 132px;
      height: 94px;
    }
    .nameplate {
      min-width: 0;
      width: 100%;
      padding: 7px 8px;
    }
    .name-row {
      font-size: .72rem;
      gap: 6px;
    }
    .hp-track { height: 11px; }

    .play-area {
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .side-panel {
      display: none;
    }
    .board-panel {
      padding: 11px;
      gap: 12px;
    }
    .board {
      grid-template-columns: repeat(4, 56px);
      gap: 7px;
      padding: 12px;
    }
    .tile {
      width: 56px;
      height: 56px;
      font-size: 1.42rem;
    }
    .buttons {
      flex-wrap: wrap;
      gap: 8px;
    }
    .attack {
      flex: 1 1 100%;
      min-width: 0;
      padding: 13px 18px;
      font-size: 1.02rem;
    }
    .secondary {
      flex: 1 1 42%;
      padding: 9px 8px;
      font-size: .78rem;
    }
    .mobile-drawer {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .drawer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 44px;
      padding: 9px 11px;
      border-radius: 11px;
      color: #ffe0a0;
      background: rgba(30,17,6,.42);
      border: 1px solid rgba(255,220,150,.16);
      font-weight: 950;
    }
    .drawer-row span {
      color: #d0b890;
      font-size: .75rem;
      font-weight: 800;
    }
  }

  @media (max-width: 420px) {
    .mockup { width: calc(100vw - 12px); }
    .game-shell { padding: 10px; }
    .battle-stage { min-height: 232px; }
    .sprite-card {
      width: 112px;
      height: 84px;
    }
    .board {
      grid-template-columns: repeat(4, 50px);
      gap: 6px;
      padding: 10px;
      border-radius: 14px;
    }
    .tile {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      font-size: 1.26rem;
    }
    .secondary { font-size: .73rem; }
  }
</style>
</head>
<body>
  <div class="library-bg" aria-hidden="true"></div>
  <main class="mockup">
    <header class="topbar">
      <div class="brand">
        <h1>Word Worm 單字蟲蟲</h1>
        <p>冒險模式戰鬥介面 mockup / inline SVG + CSS only</p>
      </div>
      <div class="mode-pill">冒險模式</div>
    </header>

    <section class="game-shell" aria-label="Adventure battle layout mockup">
      <section class="battle-stage">
        <div class="chapter">第 1 章：塵封的書庫</div>
        <div class="floating-word" aria-label="目前拼出的字">
          <div class="word-chip">Q</div>
          <div class="word-chip">U</div>
          <div class="word-chip">A</div>
          <div class="word-chip">R</div>
          <div class="word-chip">T</div>
        </div>
        <div class="combatants">
          <div class="combatant player">
            <div class="sprite-card" aria-label="player worm">
              <svg width="170" height="118" viewBox="0 0 170 118" role="img" aria-label="自繪綠蟲蟲">
                <ellipse cx="82" cy="104" rx="58" ry="8" fill="#000" opacity=".28"/>
                <circle cx="45" cy="79" r="22" fill="#74c94e"/>
                <circle cx="68" cy="74" r="25" fill="#85d85b"/>
                <circle cx="96" cy="66" r="31" fill="#7ed052"/>
                <path d="M82 39 C77 18 67 13 58 8" fill="none" stroke="#7ed052" stroke-width="6" stroke-linecap="round"/>
                <path d="M110 37 C117 17 129 12 139 8" fill="none" stroke="#7ed052" stroke-width="6" stroke-linecap="round"/>
                <circle cx="56" cy="7" r="7" fill="#ffd97a"/>
                <circle cx="141" cy="7" r="7" fill="#ffd97a"/>
                <circle cx="83" cy="58" r="17" fill="#fff8df"/>
                <circle cx="110" cy="57" r="17" fill="#fff8df"/>
                <circle cx="83" cy="58" r="10" fill="#365b9a"/>
                <circle cx="110" cy="57" r="10" fill="#365b9a"/>
                <circle cx="86" cy="54" r="4" fill="#fff"/>
                <circle cx="113" cy="53" r="4" fill="#fff"/>
                <circle cx="71" cy="77" r="5" fill="#ef9caa" opacity=".72"/>
                <circle cx="121" cy="75" r="5" fill="#ef9caa" opacity=".72"/>
                <path d="M86 83 Q97 94 110 82" fill="none" stroke="#4a2f10" stroke-width="5" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="nameplate">
              <div class="name-row"><span>你</span><span>82 / 100</span></div>
              <div class="hp-track"><div class="hp-fill player"></div></div>
            </div>
          </div>

          <div class="damage-preview">預估傷害 24</div>

          <div class="combatant monster">
            <div class="sprite-card" aria-label="monster">
              <svg width="170" height="118" viewBox="0 0 170 118" role="img" aria-label="自製書蟲怪物">
                <ellipse cx="86" cy="104" rx="50" ry="8" fill="#000" opacity=".3"/>
                <path d="M57 31 C68 8 104 9 117 31 L129 80 C119 101 51 101 41 80 Z" fill="#8f6b42" stroke="#543719" stroke-width="4"/>
                <path d="M61 34 C72 19 101 18 114 34 L119 78 C108 92 62 92 50 78 Z" fill="#d9bd7b"/>
                <path d="M59 30 L45 14 L46 50 Z" fill="#b58a53" stroke="#543719" stroke-width="4" stroke-linejoin="round"/>
                <path d="M113 30 L128 14 L126 50 Z" fill="#b58a53" stroke="#543719" stroke-width="4" stroke-linejoin="round"/>
                <circle cx="72" cy="55" r="8" fill="#2e1d0a"/>
                <circle cx="100" cy="55" r="8" fill="#2e1d0a"/>
                <circle cx="75" cy="52" r="3" fill="#fff8df"/>
                <circle cx="103" cy="52" r="3" fill="#fff8df"/>
                <circle cx="87" cy="70" r="6" fill="#cc5b4a"/>
                <path d="M87 77 L87 84" stroke="#543719" stroke-width="3" stroke-linecap="round"/>
                <path d="M57 70 L30 65 M58 78 L32 84 M116 70 L142 65 M115 78 L140 84" stroke="#543719" stroke-width="3" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="nameplate">
              <div class="name-row"><span>紙頁鼠</span><span>19 / 40</span></div>
              <div class="hp-track"><div class="hp-fill monster"></div></div>
            </div>
          </div>
        </div>
      </section>

      <section class="play-area">
        <aside class="side-panel">
          <div class="panel-title">道具欄 <span class="small-tag">下一期</span></div>
          <div class="slots" aria-hidden="true">
            <div class="slot"></div><div class="slot"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div><div class="slot"></div>
          </div>
          <div class="empty-items">即將推出<br>先保留版位，不接功能</div>
        </aside>

        <section class="board-panel">
          <div class="board" aria-label="4x4 letter board">
            <div class="tile sel">Q</div><div class="tile sel">U</div><div class="tile sel">A</div><div class="tile sel">R</div>
            <div class="tile sel">T</div><div class="tile">E</div><div class="tile">N</div><div class="tile locked">L</div>
            <div class="tile">O</div><div class="tile">I</div><div class="tile cursed">M</div><div class="tile">S</div>
            <div class="tile">D</div><div class="tile">H</div><div class="tile">C</div><div class="tile">Y</div>
          </div>
          <div class="buttons">
            <button class="btn attack">Attack / 攻擊</button>
            <button class="btn secondary">清除選字</button>
          </div>
        </section>

        <aside class="side-panel">
          <div class="panel-title">怪物技能 <span class="small-tag">紙頁鼠</span></div>
          <div class="skills">
